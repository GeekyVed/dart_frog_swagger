name: dart_frog_swagger
description: Generate OpenAPI (Swagger) specs from annotated Dart Frog handlers and serve a configurable Swagger UI docs page with a single middleware.
version: 1.0.0
repository: https://github.com/GeekyVed/dart_frog_swagger

environment:
  sdk: ^3.11.1

dependencies:
  analyzer: '>=5.0.0 <12.0.0'
  dart_frog: ^1.1.0
  meta: '>=1.15.0 <2.0.0'
  glob: ^2.1.3
  path: ^1.9.1

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
